<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Plate 創意寫作與健康檢核</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.5s ease-out forwards; }
        input::placeholder { color: #cbd5e1; font-style: italic; font-size: 0.9em; }
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-orange-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useRef, useEffect } = React;
        
        // 🔑 Canvas 執行環境會在底層自動注入金鑰，這裡必須保持空白。
        const apiKey = ""; 

        // 幫 API 請求加入指數退避 (Exponential Backoff) 的重試機制
        const fetchWithRetry = async (url, options) => {
            let delay = 1000;
            for (let i = 0; i <= 5; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (i === 5) return response; // 最後一次重試仍失敗，交由外部處理錯誤訊息
                } catch (error) {
                    if (i === 5) throw error;
                }
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
        };

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                volume2: <path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" />,
                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5" />,
                arrowRight: <path d="M5 12h14M12 5l7 7-7 7" />,
                alert: (
                    <g>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </g>
                ),
                loader: (
                    <g className="loader-spin" style={{ transformOrigin: 'center' }}>
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                    </g>
                ),
                check: <path d="M20 6L9 17l-5-5" />,
                lightbulb: <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5 M9 18h6 M10 22h4" />,
                copy: (
                    <>
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [view, setView] = useState('input'); // 'input' or 'result'
            const [inputs, setInputs] = useState({
                purpose: "", target: "", ingredients: "", object: "", adjective: "", mealType: ""
            });
            const [status, setStatus] = useState('idle');
            const [feedback, setFeedback] = useState("");
            const [finalStory, setFinalStory] = useState("");
            const [teacherTip, setTeacherTip] = useState("");
            
            // 健康檢核表狀態
            const [checklist, setChecklist] = useState({
                fruits: false,
                vegetables: false,
                protein: false,
                grains: false,
                dairy: false,
                nuts: false,
                water: false
            });

            const [copyStatus, setCopyStatus] = useState("複製文章 📋");
            const [audioUrl, setAudioUrl] = useState(null);
            const [isGeneratingAudio, setIsGeneratingAudio] = useState(false);
            const audioRef = useRef(null);

            const handleInputChange = (field, value) => {
                setInputs(prev => ({ ...prev, [field]: value }));
            };

            const toggleCheck = (key) => {
                setChecklist(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateAudio = async (text) => {
                setIsGeneratingAudio(true);
                try {
                    const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Say clearly and slowly: ${text}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    
                    if (!response.ok) throw new Error("語音生成伺服器錯誤");

                    const result = await response.json();
                    const audioPart = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                    if (audioPart) {
                        const binaryString = atob(audioPart.inlineData.data);
                        const bytes = new Int16Array(binaryString.length / 2);
                        for (let i = 0; i < binaryString.length; i += 2) {
                            bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
                        }
                        const sampleRate = parseInt(audioPart.inlineData.mimeType.match(/rate=(\d+)/)?.[1] || "24000");
                        setAudioUrl(URL.createObjectURL(pcmToWav(bytes, sampleRate)));
                    }
                } catch (e) {
                    console.error("Audio generation failed:", e);
                } finally {
                    setIsGeneratingAudio(false);
                }
            };

            const callGemini = async (prompt) => {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    isValid: { type: "BOOLEAN" },
                                    feedback: { type: "STRING" },
                                    fullStory: { type: "STRING" },
                                    teacherTip: { type: "STRING" },
                                    healthyCheck: {
                                        type: "OBJECT",
                                        properties: {
                                            hasDairy: { type: "BOOLEAN" },
                                            hasFruits: { type: "BOOLEAN" },
                                            hasVegetables: { type: "BOOLEAN" },
                                            hasProtein: { type: "BOOLEAN" },
                                            hasGrains: { type: "BOOLEAN" },
                                            hasNuts: { type: "BOOLEAN" }
                                        },
                                        required: ["hasDairy", "hasFruits", "hasVegetables", "hasProtein", "hasGrains", "hasNuts"]
                                    }
                                },
                                required: ["isValid", "feedback", "fullStory", "teacherTip", "healthyCheck"]
                            }
                        }
                    })
                });

                if (!response.ok) {
                    const errDetail = await response.json();
                    console.error("API Error Detail:", errDetail);
                    throw new Error(`API 錯誤: ${errDetail.error?.message || "未知原因"}`);
                }

                const data = await response.json();
                if (!data.candidates?.[0]) throw new Error("AI 無法處理此內容，請換個詞試試。");
                
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(rawText);
            };

            const handleSubmit = async () => {
                if (Object.values(inputs).some(v => v.trim() === "")) return setStatus('error') || setFeedback("要把空格填滿喔！🥣");
                setStatus('checking');
                setAudioUrl(null);
                try {
                    const prompt = `你是英文老師兼營養顧問。分析內容：${JSON.stringify(inputs)}。
                    
                    任務：
                    1. 判斷食材中是否包含以下六大類別：水果(hasFruits)、蔬菜(hasVegetables)、蛋白質(hasProtein)、穀物(hasGrains)、乳品(hasDairy)、堅果種子(hasNuts)。(只需回傳 true 或 false)。
                    2. 產生一段文章（fullStory），格式固定為：I want to make [purpose] for [target]. I need [ingredients]. Look! It's [object]. Do you like my [adjective] [mealType]? 【嚴禁】添加任何額外文字。
                    3. 提供一段【繁體中文】Teacher Tip (teacherTip)，用簡單、鼓勵的語氣提醒學生，例如：「你已經有 fruits 和 grains，可以再加入 vegetables，讓餐盤更健康。」【注意】不可給予任何主觀評分(如分數或百分比)，只需根據有無的類別給予客觀建議與稱讚。`;
                    
                    const res = await callGemini(prompt);
                    if (res.isValid) {
                        setFinalStory(res.fullStory);
                        setTeacherTip(res.teacherTip);
                        setChecklist({
                            fruits: res.healthyCheck.hasFruits,
                            vegetables: res.healthyCheck.hasVegetables,
                            protein: res.healthyCheck.hasProtein,
                            grains: res.healthyCheck.hasGrains,
                            dairy: res.healthyCheck.hasDairy,
                            nuts: res.healthyCheck.hasNuts,
                            water: false // 預設為 false，讓學生自己勾選
                        });
                        setFeedback(res.feedback);
                        setStatus('success');
                        setView('result');
                        generateAudio(res.fullStory);
                    } else {
                        setFeedback(res.feedback);
                        setStatus('error');
                    }
                } catch (e) {
                    console.error("Submit error:", e);
                    setFeedback(e.message || "連線失敗，請稍後再試。");
                    setStatus('error');
                }
            };

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = finalStory;
                document.body.appendChild(el);
                el.select();
                try {
                    document.execCommand('copy');
                    setCopyStatus("已複製 ✅");
                } catch (err) {
                    setCopyStatus("複製失敗 ❌");
                }
                document.body.removeChild(el);
                setTimeout(() => setCopyStatus("複製文章 📋"), 2000);
            };

            // 檢核表項目定義
            const checkItems = [
                { key: 'fruits', label: 'I have fruits.', icon: '🍎' },
                { key: 'vegetables', label: 'I have vegetables.', icon: '🥦' },
                { key: 'protein', label: 'I have protein foods.', icon: '🍗' },
                { key: 'grains', label: 'I have grains.', icon: '🍞' },
                { key: 'dairy', label: 'I have some milk.', icon: '🥛' },
                { key: 'nuts', label: 'I have nuts and seeds.', icon: '🥜' },
                { key: 'water', label: 'I drink enough water.', icon: '💧' },
            ];

            return (
                <div className="max-w-3xl mx-auto p-4 md:py-8">
                    <div className="bg-white rounded-[32px] shadow-2xl overflow-hidden border-4 border-white">
                        {/* Header */}
                        <div className="bg-gradient-to-r from-orange-400 to-red-400 p-6 md:p-8 text-white text-center">
                            <h1 className="text-3xl md:text-4xl font-black tracking-tight flex items-center justify-center gap-3">
                                <Icon name="utensils" className="w-8 h-8 md:w-10 md:h-10" /> My Plate 
                            </h1>
                            <p className="text-orange-100 font-medium mt-2 text-lg">創意寫作與健康餐盤</p>
                        </div>

                        <div className="p-6 md:p-10">
                            {/* 輸入模式 */}
                            {view === 'input' && (
                                <div className="space-y-8 animate-in">
                                    <div className="text-xl md:text-2xl leading-[3.5rem] md:leading-[4rem] text-slate-700 font-medium bg-slate-50 p-8 rounded-3xl border-2 border-slate-100 shadow-sm">
                                        I want to make <input className="border-b-4 border-orange-200 outline-none w-28 text-center text-orange-600 font-bold focus:border-orange-500 bg-transparent transition-colors" value={inputs.purpose} onChange={e => handleInputChange('purpose', e.target.value)} placeholder="lunch" /> 
                                        for <input className="border-b-4 border-orange-200 outline-none w-36 text-center text-orange-600 font-bold focus:border-orange-500 bg-transparent transition-colors" value={inputs.target} onChange={e => handleInputChange('target', e.target.value)} placeholder="my mom" />. 
                                        <br className="hidden md:block" />
                                        I need <input className="border-b-4 border-orange-200 outline-none flex-grow min-w-[250px] text-center text-orange-600 font-bold focus:border-orange-500 bg-transparent transition-colors" value={inputs.ingredients} onChange={e => handleInputChange('ingredients', e.target.value)} placeholder="some chicken and rice" />. 
                                        <br className="hidden md:block" />
                                        Look! It’s <input className="border-b-4 border-orange-200 outline-none w-56 text-center text-orange-600 font-bold focus:border-orange-500 bg-transparent transition-colors" value={inputs.object} onChange={e => handleInputChange('object', e.target.value)} placeholder="a big star" />. 
                                        <br className="hidden md:block" />
                                        Do you like my <input className="border-b-4 border-orange-200 outline-none w-32 text-center text-orange-600 font-bold focus:border-orange-500 bg-transparent transition-colors" value={inputs.adjective} onChange={e => handleInputChange('adjective', e.target.value)} placeholder="cute" /> <input className="border-b-4 border-orange-200 outline-none w-32 text-center text-orange-600 font-bold focus:border-orange-500 bg-transparent transition-colors" value={inputs.mealType} onChange={e => handleInputChange('mealType', e.target.value)} placeholder="lunch" />?
                                    </div>
                                    
                                    {status === 'error' && (
                                        <div className="p-4 bg-red-50 text-red-600 rounded-2xl text-lg font-bold animate-in flex items-center justify-center gap-2 border border-red-200">
                                            <Icon name="alert" className="w-6 h-6" /> {feedback}
                                        </div>
                                    )}

                                    <button onClick={handleSubmit} disabled={status === 'checking'} className="w-full py-5 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-[2rem] font-black text-2xl hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-3 shadow-xl shadow-orange-200 disabled:opacity-70 disabled:cursor-not-allowed">
                                        {status === 'checking' ? <><Icon name="loader" className="w-8 h-8" /> 檢查中...</> : <>完成設計 <Icon name="arrowRight" className="w-8 h-8" /></>}
                                    </button>
                                </div>
                            )}

                            {/* 結果模式 */}
                            {view === 'result' && (
                                <div className="space-y-10 animate-in">
                                    
                                    {/* A. My Story 區塊 */}
                                    <section>
                                        <h2 className="text-2xl font-black text-orange-600 mb-4 flex items-center gap-2 border-b-2 border-orange-100 pb-2">
                                            <span className="bg-orange-100 text-orange-600 px-3 py-1 rounded-lg">A</span> My Story
                                        </h2>
                                        <div className="bg-orange-50 p-6 md:p-8 rounded-[32px] relative border-2 border-orange-200 shadow-sm">
                                            <p className="text-xl md:text-2xl leading-relaxed text-slate-800 font-bold italic mb-6">
                                                "{finalStory}"
                                            </p>
                                            
                                            <div className="flex flex-wrap gap-3">
                                                {/* 朗讀按鈕 */}
                                                {isGeneratingAudio ? (
                                                    <div className="px-5 py-3 bg-white text-orange-400 rounded-xl animate-pulse flex items-center gap-2 font-bold shadow-sm border border-orange-100">
                                                        <Icon name="loader" className="w-5 h-5" /> 語音生成中...
                                                    </div>
                                                ) : audioUrl && (
                                                    <button onClick={() => audioRef.current.play()} className="px-5 py-3 bg-white text-orange-600 hover:bg-orange-100 rounded-xl shadow-sm border border-orange-200 flex items-center gap-2 font-black transition-colors active:scale-95">
                                                        <Icon name="volume2" className="w-5 h-5" /> 朗讀文章
                                                    </button>
                                                )}
                                                
                                                {/* 複製按鈕 */}
                                                <button onClick={copyToClipboard} className="px-5 py-3 bg-white text-slate-600 hover:bg-slate-100 rounded-xl shadow-sm border border-slate-200 flex items-center gap-2 font-black transition-colors active:scale-95">
                                                    <Icon name="copy" className="w-5 h-5" /> {copyStatus}
                                                </button>
                                            </div>
                                            <audio ref={audioRef} src={audioUrl} />
                                        </div>
                                    </section>

                                    {/* B. My Healthy Check 區塊 */}
                                    <section>
                                        <h2 className="text-2xl font-black text-green-600 mb-4 flex items-center gap-2 border-b-2 border-green-100 pb-2">
                                            <span className="bg-green-100 text-green-600 px-3 py-1 rounded-lg">B</span> My Healthy Check
                                        </h2>
                                        <p className="text-slate-500 font-medium mb-4 text-sm md:text-base">請根據你的餐盤，點擊勾選你擁有的食物類別喔！</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {checkItems.map((item) => (
                                                <div 
                                                    key={item.key} 
                                                    onClick={() => toggleCheck(item.key)} 
                                                    className={`p-4 rounded-2xl border-2 flex items-center gap-4 cursor-pointer transition-all duration-200 active:scale-[0.98] ${checklist[item.key] ? 'border-green-400 bg-green-50 shadow-sm' : 'border-slate-200 bg-white hover:border-slate-300'}`}
                                                >
                                                    <div className={`w-8 h-8 rounded-xl flex items-center justify-center transition-colors ${checklist[item.key] ? 'bg-green-500 text-white' : 'bg-slate-100'}`}>
                                                        {checklist[item.key] && <Icon name="check" className="w-5 h-5" />}
                                                    </div>
                                                    <span className="text-2xl">{item.icon}</span>
                                                    <span className={`font-bold text-lg md:text-xl ${checklist[item.key] ? 'text-green-800' : 'text-slate-600'}`}>
                                                        {item.label}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    {/* C. Teacher Tip 區塊 */}
                                    <section>
                                        <h2 className="text-2xl font-black text-blue-600 mb-4 flex items-center gap-2 border-b-2 border-blue-100 pb-2">
                                            <span className="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg">C</span> Teacher Tip
                                        </h2>
                                        <div className="bg-blue-50 border-l-8 border-blue-400 p-6 rounded-r-[24px] rounded-l-md shadow-sm">
                                            <div className="flex items-start gap-4">
                                                <div className="bg-blue-100 p-3 rounded-full text-blue-500 flex-shrink-0">
                                                    <Icon name="lightbulb" className="w-8 h-8" />
                                                </div>
                                                <p className="text-blue-800 font-bold text-lg md:text-xl leading-relaxed pt-1">
                                                    {teacherTip}
                                                </p>
                                            </div>
                                        </div>
                                    </section>

                                    {/* 重新設計按鈕 */}
                                    <div className="pt-4 border-t-2 border-slate-100">
                                        <button onClick={() => {setView('input'); setStatus('idle'); setAudioUrl(null);}} className="w-full py-4 text-slate-500 font-bold hover:text-orange-500 hover:bg-orange-50 rounded-2xl flex items-center justify-center gap-2 transition-colors text-lg">
                                            <Icon name="rotate" className="w-5 h-5" /> 重新設計另一份餐盤
                                        </button>
                                    </div>

                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
